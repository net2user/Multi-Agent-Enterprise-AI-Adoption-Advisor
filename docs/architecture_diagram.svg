<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="760" fill="#FFFFFF"/>

  <!-- Input -->
  <rect x="330" y="30" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="450" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Use case input</text>
  <text x="450" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">e.g. AI for procurement</text>

  <line x1="450" y1="86" x2="450" y2="120" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <rect x="330" y="124" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
  <text x="450" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Orchestrator</text>
  <text x="450" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">LangGraph routing</text>

  <line x1="450" y1="180" x2="450" y2="214" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tier: Value, Risk, Architecture -->
  <rect x="40" y="218" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <text x="160" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Value agent</text>
  <text x="160" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Business impact scoring</text>

  <rect x="330" y="218" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <text x="450" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Risk and Governance agent</text>
  <text x="450" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Compliance and security</text>

  <rect x="620" y="218" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <text x="740" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Architecture agent</text>
  <text x="740" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Integration feasibility</text>

  <line x1="450" y1="274" x2="450" y2="308" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Adoption -->
  <rect x="330" y="312" width="240" height="56" rx="8" fill="#FFFFFF" stroke="#FBBC05" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Adoption agent</text>
  <text x="450" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Change readiness</text>

  <line x1="450" y1="368" x2="450" y2="402" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Executive Summary -->
  <rect x="300" y="406" width="300" height="56" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <text x="450" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Executive Summary agent</text>
  <text x="450" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Board level briefing</text>

  <line x1="450" y1="462" x2="450" y2="496" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="270" y="500" width="360" height="64" rx="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="450" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Output</text>
  <text x="450" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Value, risk, complexity, adoption scores,</text>
  <text x="450" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Fund / Fund with Conditions / Delay / Do Not Fund</text>

  <!-- Separate: Portfolio Prioritization -->
  <line x1="450" y1="564" x2="450" y2="600" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="450" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" font-style="italic">across multiple scored use cases</text>

  <rect x="270" y="604" width="360" height="64" rx="8" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
  <text x="450" y="628" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#1a1a1a">Portfolio Prioritization agent</text>
  <text x="450" y="648" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a1a1a">Quick Win / Strategic Bet / Long Term Play / Reconsider</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Signature band -->
  <text x="450" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a">
    Enterprise AI Adoption Advisor system architecture. Vikas Sharma, Senior AI and Digital Transformation Advisor | linkedin.com/in/sharma1vikas
  </text>
</svg>
